<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Bestie 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>
:root{
    --primary: #ff4d88;
    --secondary: #9333ea;
    --glass: rgba(255, 255, 255, 0.1);
    --text: #fff;
    --success: #065f46;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
    background: #0f172a;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    color: var(--text);
}

/* Dynamic background glow */
#bgGlow {
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 50% 50%, #1e293b, #0f172a);
    z-index: -2;
    transition: background 1.5s ease;
}

.heart-bg {
    position: absolute;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: -1;
}

/* Refined Glass Card */
.container {
    width: 92%;
    max-width: 420px;
    background: var(--glass);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    padding: 40px 30px;
    border-radius: 30px;
    border: 1px solid rgba(255, 255, 255, 0.15);
    text-align: center;
    position: absolute;
    opacity: 0;
    transform: scale(0.9) translateY(20px);
    pointer-events: none;
    transition: 0.8s cubic-bezier(.4, 0, .2, 1);
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
}

.active {
    opacity: 1;
    transform: scale(1) translateY(0);
    z-index: 10;
    pointer-events: all;
}

/* Custom CSS Modal for the end */
#successModal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(15, 23, 42, 0.8);
    backdrop-filter: blur(10px);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 2000;
}

.modal-content {
    background: linear-gradient(135deg, #1e293b, #0f172a);
    padding: 40px;
    border-radius: 30px;
    border: 2px solid var(--primary);
    text-align: center;
    transform: scale(0.7);
    transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    max-width: 350px;
}

#successModal.show {
    display: flex;
}

#successModal.show .modal-content {
    transform: scale(1);
}

/* Icons */
.css-icon {
    font-size: 80px;
    margin-bottom: 20px;
    display: block;
    filter: drop-shadow(0 0 10px var(--primary));
    animation: float 4s ease-in-out infinite;
}

@keyframes float {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-15px) scale(1.1); }
}

h1 {
    font-family: 'Dancing Script', cursive;
    font-size: 42px;
    margin-bottom: 15px;
    background: linear-gradient(to right, #ff7eb3, #ff4d88);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.bff-text {
    font-weight: 600;
    background: linear-gradient(45deg, #fff, #ff4d88, #9333ea, #fff);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shine 3s linear infinite;
}

@keyframes shine {
    to { background-position: 200% center; }
}

p {
    font-size: 16px;
    color: #cbd5e1;
    margin-bottom: 10px;
    min-height: 50px;
    line-height: 1.5;
}

/* Button Styling */
.btn-group {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 25px;
}

button {
    padding: 14px 28px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(45deg, var(--primary), #ff1f6b);
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 8px 15px rgba(255, 77, 136, 0.3);
}

button:hover {
    transform: translateY(-5px);
    box-shadow: 0 12px 20px rgba(255, 77, 136, 0.4);
}

#nope-btn {
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    box-shadow: none;
    z-index: 1000;
}

/* Music Card Pulse */
.music-card {
    background: rgba(0,0,0,0.3);
    padding: 25px;
    border-radius: 20px;
    margin: 20px 0;
    border: 1px solid rgba(147, 51, 234, 0.3);
}

.playing-now {
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(147, 51, 234, 0.4); }
    70% { box-shadow: 0 0 0 15px rgba(147, 51, 234, 0); }
    100% { box-shadow: 0 0 0 0 rgba(147, 51, 234, 0); }
}

/* Heart animations */
.floating-heart {
    position: absolute;
    color: var(--primary);
    pointer-events: none;
    animation: heartFloat linear infinite;
    opacity: 0;
}

@keyframes heartFloat {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    20% { opacity: 0.8; }
    100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
}
</style>
</head>
<body>

<div id="bgGlow"></div>
<div class="heart-bg" id="heartContainer"></div>
<canvas id="confetti" style="position:fixed; top:0; left:0; pointer-events:none; z-index:100;"></canvas>

<div id="successModal">
    <div class="modal-content">
        <span class="css-icon" style="font-size: 60px;">🎉</span>
        <h1 style="font-size: 30px;">Yay!</h1>
        <p style="min-height: auto; color: #fff;">Best friends forever! 💖✨<br>You just made my day!</p>
        <button onclick="closeModal()">YAY</button>
    </div>
</div>

<div class="container active" id="page1">
    <span class="css-icon">💔</span>
    <h1>Hey Bestie 🥺</h1>
    <p id="text1"></p>
    <div class="btn-group">
        <button onclick="nextPage(2)">Okay... Tell me</button>
        <button id="nope-btn">Nope</button>
    </div>
</div>

<div class="container" id="page2">
    <span class="css-icon">🙏</span>
    <h1>I’m Really Sorry 🥹</h1>
    <p id="text2"></p>
    <button onclick="nextPage(3)">Go on...</button>
</div>

<div class="container" id="page3">
    <span class="css-icon">🎵</span>
    <h1>A Song For You</h1>
    <div class="music-card" id="musicBox">
        <audio id="bgMusic" loop>
            <source src="music1.mp3" type="audio/mpeg">
        </audio>
        <p style="min-height: auto; font-size: 14px;">Let the music speak...</p>
        <button onclick="toggleMusic()">Play / Pause 🎶</button>
    </div>
    <button onclick="nextPage(4)">Next</button>
</div>

<div class="container" id="page4">
    <span class="css-icon">💞</span>
    <h1>Dil Se Sorry</h1>
    <p id="text4"></p>
    <button onclick="nextPage(5)">Last Thing</button>
</div>

<div class="container" id="page5">
    <span class="css-icon">✨</span>
    <h1 class="bff-text">Best Friends Forever?</h1>
    <p>I promise to be a better bestie. Can we fix this? 🥹</p>
    <button onclick="celebrate()">Yes, I Forgive You ❤️</button>
</div>

<script>
/* Runaway Nope Button Logic */
const nopeBtn = document.getElementById('nope-btn');
nopeBtn.addEventListener('mouseover', () => {
    const x = Math.random() * (window.innerWidth - nopeBtn.offsetWidth);
    const y = Math.random() * (window.innerHeight - nopeBtn.offsetHeight);
    nopeBtn.style.position = 'fixed';
    nopeBtn.style.left = x + 'px';
    nopeBtn.style.top = y + 'px';
});

/* Page Management */
function nextPage(num){
    document.querySelectorAll('.container').forEach(p => p.classList.remove('active'));
    document.getElementById('page'+num).classList.add('active');
    
    if(num === 2) typeWriter("text2", "Hurting you was never my intention. You matter way too much to me. 💖", 40);
    if(num === 4) typeWriter("text4", "Our friendship is a treasure I don't want to lose. I promise I'll do better from now on. ✨", 40);

    const bg = document.getElementById('bgGlow');
    const colors = {
        1: "radial-gradient(circle at 50% 50%, #1e293b, #0f172a)",
        2: "radial-gradient(circle at 50% 50%, #2e1065, #0f172a)",
        3: "radial-gradient(circle at 50% 50%, #4c1d95, #0f172a)",
        4: "radial-gradient(circle at 50% 50%, #831843, #0f172a)",
        5: "radial-gradient(circle at 50% 50%, #065f46, #0f172a)"
    };
    bg.style.background = colors[num];
}

/* Typewriter Logic */
function typeWriter(id, text, speed) {
    const el = document.getElementById(id);
    el.innerHTML = ""; 
    let i = 0;
    function typing() {
        if (i < text.length) {
            el.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, speed);
        }
    }
    typing();
}

typeWriter("text1", "I know I messed up... but please hear me out 💔", 40);

/* Music Logic */
function toggleMusic(){
    const music = document.getElementById('bgMusic');
    const box = document.getElementById('musicBox');
    if(music.paused) {
        music.play();
        box.classList.add('playing-now');
    } else {
        music.pause();
        box.classList.remove('playing-now');
    }
}

/* Floating Hearts */
function createHeart(){
    const container = document.getElementById('heartContainer');
    const heart = document.createElement('div');
    heart.innerHTML = ['❤️','💖','✨','🌸'][Math.floor(Math.random()*4)];
    heart.classList.add('floating-heart');
    heart.style.left = Math.random() * 100 + 'vw';
    heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
    heart.style.fontSize = (Math.random() * 15 + 15) + 'px';
    container.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}
setInterval(createHeart, 400);

/* Modal Logic */
function closeModal() {
    document.getElementById('successModal').classList.remove('show');
}

/* Pro Confetti Celebration */
function celebrate(){
    // Show Modal instead of alert
    document.getElementById('successModal').classList.add('show');

    const canvas = document.getElementById("confetti");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let particles = [];
    for(let i=0; i<150; i++) {
        particles.push({
            x: canvas.width/2,
            y: canvas.height/2,
            size: Math.random() * 8 + 4,
            color: `hsl(${Math.random() * 360}, 100%, 50%)`,
            velX: (Math.random() - 0.5) * 15,
            velY: (Math.random() - 0.5) * 15,
            gravity: 0.3
        });
    }

    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        particles.forEach((p, i) => {
            p.velY += p.gravity;
            p.x += p.velX;
            p.y += p.velY;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, p.size, p.size);
        });
        requestAnimationFrame(draw);
    }
    draw();
}
</script>

</body>
</html>
